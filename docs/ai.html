        options: {
            scales: {
                y: {
                    min: -1,
                    max: 1,
                    grid: {
                        drawBorder: true,
                        color: function(context) {
                            if (context.tick.value === 0) {
                                return '#000';
                            }
                            return '#e0e0e0';
                        },
                        lineWidth: function(context) {
                            return context.tick.value === 0 ? 2 : 1;
                        }
                    }
                },
                x: {
                    ticks: {
                        autoSkip: true,
                        maxTicksLimit: 10
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
</script>
